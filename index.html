<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b0e0c" />
    <title>Practical Range — 3D USPSA Shooter</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%23e0b040' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23e0b040'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div id="app">
      <!-- Three.js renderer canvas is injected here -->
      <div id="scene-root"></div>

      <!-- In-game heads-up display (managed by src/ui/HUD.js; it toggles its
           own visibility via an internal class, so no base .hidden here) -->
      <div id="hud-root"></div>

      <!-- Menus / overlays (managed by src/ui/Menu.js) -->
      <div id="menu-root"></div>

      <!-- Loading splash shown until the game boots -->
      <div id="boot-splash">
        <div class="boot-inner">
          <div class="boot-title">PRACTICAL RANGE</div>
          <div class="boot-sub">Loading range…</div>
          <div class="boot-bar"><span></span></div>
        </div>
      </div>
    </div>

    <noscript>
      <div style="color:#fff;font-family:sans-serif;padding:2rem">
        This game requires JavaScript and a WebGL-capable browser.
      </div>
    </noscript>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
